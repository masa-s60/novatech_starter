<!DOCTYPE html>

<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Nova Tech</title>
    <meta name="description" content="未来を創る最先端のIT技術を提供" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="shortcut icon" href="image/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/destyle.css@1.0.15/destyle.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="body">
    <header class="c-header">
      <img src="./image/logo-pc.png" alt="" class="c-header__logo">
      <nav class="c-header-nav">
        <ul class="c-header-nav__list">
          <li class="c-header-nav__item">
            <a class="c-header-nav__link" href="">SERVICE</a>
          </li>
          <li class="c-header-nav__item">
            <a class="c-header-nav__link" href="">ABOUT</a>
          </li>
          <li class="c-header-nav__item">
            <a class="c-header-nav__link" href="">CONTACT</a>
          </li>
        </ul>
      </nav>
      <button class="c-hamburger" type="button" aria-expanded="false">
    	  <span class="c-hamburger__bar"></span>
      </button>
      <div class="c-drawer">
        <nav class="c-drawer-nav">
          <ul class="c-drawer-nav__list">
            <li class="c-drawer-nav__item"><a href="">SERVICE</a></li>
            <li class="c-drawer-nav__item"><a href="">ABOUT</a></li>
            <li class="c-drawer-nav__item"><a href="">CONTACT</a></li>
            <li class="c-drawer-nav__item"><a href="">利用規約</a></li>
            <li class="c-drawer-nav__item"><a href="">プライバシーポリシー</a></li>
            <li class="c-drawer-nav__item">
              <div class="c-sns">
                <a href="https://x.com/?lang=ja" class="c-sns__link">
                  <img src="./image/x-img.png" alt="x" class="c-sns__img">
                </a>
                <a href="https://x.com/?lang=ja" class="c-sns__link">
                  <img src="./image/insta-img.png" alt="instagram" class="c-sns__img">
                </a>
              </div>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="p-main">
      <section class="p-firstView">
        <ul class="p-firstView__list">
          <li class="p-firstView__item is-active">
            <picture class="p-firstView__image">
              <source srcset="./image/slide01.png" media="(min-width: 821px)">
              <img src="./image/sp-slide01.png" alt="未来を創る　最先端のIT技術を提供">
            </picture>
          </li>
          <li class="p-firstView__item">
            <picture class="p-firstView__image">
              <source srcset="./image/slide02.png" media="(min-width: 821px)">
              <img src="./image/sp-slide02.png" alt="未来を創る　最先端のIT技術を提供">
            </picture>
          </li>
          <li class="p-firstView__item">
            <picture class="p-firstView__image">
              <source srcset="./image/slide03.png" media="(min-width: 821px)">
              <img src="./image/sp-slide03.png" alt="未来を創る　最先端のIT技術を提供">
            </picture>
          </li>
        </ul>
        <div class="p-firstView__text">
          <p class="p-firstView__text-copy">未来を創る</p>
          <p>最先端のIT技術を提供</p>
        </div>
      </section>

<!-- support -->

      <section class="p-support">
        <div class="p-support__inner">

          <div class="p-support__visual">
            <div class="p-support__image">
              <img src="./image/support01.jpg" alt="サポートイメージ">
            </div>
            <div class="p-support__images">
              <div class="p-support__images--left">
                <img src="./image/support03.png" alt="">
              </div>
              <div class="p-support__images--right">
                <img src="./image/support04.png" alt="">
              </div>
            </div>
          </div>

          <div class="p-support__contents">
            <div class="p-support__detail">
              <h2 class="c-section-title u-bottom-margin">信頼の技術とサポート</h2>
              <p class="c-section-text">
                私たちは、お客様のビジネスを次のレベルへと導くため、 最先端の技術と専門知識を活用しています。 カスタマイズされたソリューションと信頼性の高いサポートを 提供し、持続可能な成長と成功を実現します。 私たちの使命は、お客様の目標を達成するための強力な パートナーであり続けることです。
              </p>
            </div>
            <div class="p-support__image">
              <img src="./image/support02.jpg" alt="サポートイメージ">
            </div>
          </div>
        </div>
      </section>

    </main>

    <script src="js/common.js" defer></script>
    <script src="js/frontPage.js" defer></script>
    <script src="js/hamburger.js" defer></script>
  </body>
</html>
